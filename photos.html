<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Photos | Incite Studio</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  :root {
    --red: #9c0e0e;
    --red-light: #c01414;
    --red-glow: rgba(156,14,14,0.35);
    --dark: #0a0a0a;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --border: rgba(255,255,255,0.07);
    --light: #f0f0f0;
    --muted: #888;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--dark);color:var(--light);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}

  /* NAV */
  nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(10,10,10,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem}
  .nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
  .logo{display:flex;align-items:center;text-decoration:none}
  .logo img{height:38px;width:auto;display:block}
  .nav-links{display:flex;gap:2rem;list-style:none}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;transition:color .2s}
  .nav-links a:hover, .nav-links a.active{color:var(--light)}
  .nav-cta{background:var(--red);color:#fff;padding:.45rem 1.1rem;border-radius:4px;font-size:.82rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:background .2s,box-shadow .2s}
  .nav-cta:hover{background:var(--red-light);box-shadow:0 0 18px var(--red-glow)}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
  .hamburger span{display:block;width:24px;height:2px;background:var(--light)}
  @media(max-width:768px){
    .nav-links{display:none;position:absolute;top:64px;left:0;width:100%;background:var(--dark2);flex-direction:column;padding:1.5rem 2rem;gap:1.2rem;border-bottom:1px solid var(--border)}
    .nav-links.open{display:flex}
    .hamburger{display:flex}
  }

  /* HERO */
  .page-hero{padding:9rem 2rem 5rem;text-align:center;position:relative;overflow:hidden;background:var(--dark2)}
  .page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(192,57,43,0.15) 0%,transparent 65%)}
  .hero-grid{position:absolute;inset:0;opacity:.05;background-image:linear-gradient(var(--muted) 1px,transparent 1px),linear-gradient(90deg,var(--muted) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
  .page-hero .label{position:relative;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--red);margin-bottom:.8rem;font-weight:600}
  .page-hero h1{position:relative;font-size:clamp(2.5rem,7vw,5rem);font-weight:900;letter-spacing:-.02em;text-transform:uppercase;line-height:1}
  .page-hero .divider{width:48px;height:3px;background:var(--red);margin:1.2rem auto 0}

  /* GALLERY */
  .gallery-wrap{max-width:1200px;margin:0 auto;padding:4rem 2rem 6rem}

  /* Masonry grid */
  .gallery{columns:3;column-gap:1rem}
  @media(max-width:900px){.gallery{columns:2}}
  @media(max-width:500px){.gallery{columns:1}}

  .gallery-item{break-inside:avoid;margin-bottom:1rem;position:relative;overflow:hidden;border-radius:6px;cursor:pointer;background:var(--dark3)}
  .gallery-item img{display:block;width:100%;height:auto;transition:transform .4s ease,filter .4s ease;filter:brightness(.9)}
  .gallery-item:hover img{transform:scale(1.04);filter:brightness(1)}
  .gallery-item .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.5) 0%,transparent 50%);opacity:0;transition:opacity .3s}
  .gallery-item:hover .overlay{opacity:1}

  /* LIGHTBOX */
  .lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);align-items:center;justify-content:center;padding:1rem}
  .lightbox.open{display:flex}
  .lb-inner{position:relative;max-width:90vw;max-height:90vh}
  .lb-inner img{display:block;max-width:100%;max-height:90vh;border-radius:6px;object-fit:contain;box-shadow:0 0 80px rgba(0,0,0,.8)}
  .lb-close{position:absolute;top:-2.5rem;right:0;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;line-height:1;opacity:.7;transition:opacity .2s}
  .lb-close:hover{opacity:1}
  .lb-prev,.lb-next{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:1.2rem;transition:background .2s;z-index:201}
  .lb-prev{left:1rem}
  .lb-next{right:1rem}
  .lb-prev:hover,.lb-next:hover{background:rgba(192,57,43,.5)}
  .lb-counter{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);color:var(--muted);font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;z-index:201}

  /* FOOTER */
  footer{background:var(--dark2);border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--muted);font-size:.8rem;letter-spacing:.04em}
  footer a{color:var(--muted);text-decoration:none}
  footer a:hover{color:var(--red)}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><img src="logo.png" alt="Incite Studio"></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#services">Services</a></li>
      <li><a href="index.html#gear">Gear</a></li>
      <li><a href="index.html#samples">Samples</a></li>
      <li><a href="photos.html" class="active">Photos</a></li>
    </ul>
    <a href="index.html#contact" class="nav-cta">Contact Us</a>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="page-hero">
  <div class="hero-grid"></div>
  <p class="label">The Space</p>
  <h1>Studio Photos</h1>
  <div class="divider"></div>
</div>

<div class="gallery-wrap">
  <div class="gallery" id="gallery"></div>
</div>

<div class="lightbox" id="lightbox">
  <div class="lb-inner">
    <button class="lb-close" id="lbClose">✕</button>
    <img id="lbImg" src="" alt="">
  </div>
  <button class="lb-prev" id="lbPrev">&#8592;</button>
  <button class="lb-next" id="lbNext">&#8594;</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<footer>
  <p>© 2025 Incite Studio · Wexford, Pennsylvania · <a href="mailto:nathan@incite-studio.com">nathan@incite-studio.com</a></p>
</footer>

<script>
const PHOTOS = [
  "manley.jpg",
  "neve.jpg",
  "drum-booth.jpg",
  "booth1.jpg",
  "Lynx.jpg",
  "RatsOfReason.JPG",
  "MattE.jpg",
  "Scheps Douds.jpg",
  "DanBruce.jpg",
  "Reggie.jpg",
  "snares.jpg"
];

// Build gallery
const gallery = document.getElementById('gallery');
PHOTOS.forEach((src, i) => {
  const item = document.createElement('div');
  item.className = 'gallery-item';
  item.innerHTML = `<img src="${src}" alt="Studio photo ${i+1}" loading="lazy"><div class="overlay"></div>`;
  item.addEventListener('click', () => openLightbox(i));
  gallery.appendChild(item);
});

// Lightbox
let cur = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCounter = document.getElementById('lbCounter');

function openLightbox(i) {
  cur = i;
  lbImg.src = PHOTOS[i];
  lbCounter.textContent = `${i+1} / ${PHOTOS.length}`;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}
function showNext() { openLightbox((cur+1) % PHOTOS.length); }
function showPrev() { openLightbox((cur - 1 + PHOTOS.length) % PHOTOS.length); }

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbNext').addEventListener('click', showNext);
document.getElementById('lbPrev').addEventListener('click', showPrev);
lb.addEventListener('click', e => { if(e.target === lb) closeLightbox(); });
document.addEventListener('keydown', e => {
  if(!lb.classList.contains('open')) return;
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowRight') showNext();
  if(e.key === 'ArrowLeft') showPrev();
});

// Nav hamburger
const ham = document.getElementById('hamburger'), navLinks = document.getElementById('navLinks');
ham.addEventListener('click', () => navLinks.classList.toggle('open'));
</script>
</body>
</html>
